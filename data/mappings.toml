# Centralized name mappings: source name → NCAA canonical name.
#
# NCAA names (from the NCAA API's `nameShort`) are the canonical team names
# used throughout the codebase. When a source (KenPom, Kalshi, etc.) uses a
# different spelling, add the mapping here.
#
# Only entries where the names differ need to be listed.

[kenpom]
"Connecticut" = "UConn"
"LIU" = "Long Island"
"Miami FL" = "Miami (FL)"
"Miami OH" = "Miami (Ohio)"
"N.C. State" = "NC State"
"Queens" = "Queens (N.C.)"

# NCAA API nameShort values that differ from the canonical names in tournament.json.
# Key = NCAA API nameShort, Value = tournament.json canonical name.
[ncaa]
"Saint Mary's (CA)" = "Saint Mary's"
"South Fla." = "South Florida"

[kalshi]
"California Baptist" = "Cal Baptist"
"Connecticut" = "UConn"
"Hawai'i" = "Hawaii"
"LIU" = "Long Island"
"Miami (OH)" = "Miami (Ohio)"
"Mississippi State" = "Mississippi St."
"North Carolina St." = "NC State"
"Queens University" = "Queens (N.C.)"

# Short display names for teams whose NCAA name exceeds 9 characters.
# Used by fetch-bracket to populate the "abbrev" field in tournament.json.
# Key = NCAA nameShort (canonical name), Value = abbreviated display name.
[abbreviations]
"Cal Baptist" = "CBU"
"High Point" = "High Pt"
"Kennesaw St." = "Kennesaw"
"Long Island" = "LIU"
"Miami (Ohio)" = "Miami OH"
"Michigan St." = "Mich St"
"Miami (FL)" = "Miami FL"
"North Carolina" = "UNC"
"North Dakota St." = "NDSU"
"Northern Iowa" = "UNI"
"Prairie View A&M" = "PV A&M"
"Queens (N.C.)" = "Queens NC"
"Saint Louis" = "SLU"
"Saint Mary's" = "St Mary's"
"Santa Clara" = "SCU"
"South Florida" = "USF"
"Tennessee St." = "Tenn St"
"Texas Tech" = "TT"
"Wright St." = "Wright"
"Howard" = "Howard"
"Lehigh" = "Lehigh"
"NC State" = "NCSU"
