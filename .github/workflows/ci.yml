name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Changeset check ───────────────────────────────────────────────
  changeset:
    name: Changeset Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check .changeset/*.md file was added
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^\.changeset/.*\.md$' \
            | grep -v '^\.changeset/README\.md$' \
            || (echo "::error::Every PR must include a changeset file in .changeset/ (run: bunx changeset)" && exit 1)

      - name: Check docs/changeset.md was NOT modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^docs/changeset\.md$'; then
            echo "::error::Do not edit docs/changeset.md directly — add a .changeset/*.md file instead (run: bunx changeset)"
            exit 1
          fi

  # ─── Contracts ──────────────────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2

      - run: mise run build
      - run: mise run test
      - run: mise run fmt-check

  # ─── Packages (TypeScript) ─────────────────────────────────────────
  packages:
    name: Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v2

      - run: mise run typecheck
      - run: mise run lint::check
      - run: mise run build
      - run: mise run test

  # ─── Crates (Rust) ─────────────────────────────────────────────────
  crates-build:
    name: Crates — Build & Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
