[tasks.install]
hide = true
description = "Install JS dependencies"
dir = "{{config_root}}/.."
run = "bun install"

[tasks.typecheck]
description = "Typecheck client, web, and localdev packages"
depends = ["install"]
run = [
  "cd ../packages/client && bun run typecheck",
  "cd ../packages/web && bun run typecheck",
  "cd ../packages/localdev && bun run typecheck",
]

[tasks."lint::check"]
description = "Lint check client, web, and localdev packages"
depends = ["install"]
run = [
  "cd ../packages/client && bun run lint:check",
  "cd ../packages/web && bun run lint:check",
  "cd ../packages/localdev && bun run lint:check",
]

[tasks.build]
description = "Build client, web, and localdev packages"
depends = ["install"]
run = [
  "cd ../packages/client && bun run build",
  "cd ../packages/web && bun run build",
  "cd ../packages/localdev && bun run build",
]

[tasks.test]
description = "Run package tests"
depends = ["install"]
run = "cd ../packages/client && bun test"

[tasks.ci]
description = "Run full packages CI"
run = { tasks = ["typecheck", "lint::check", "build", "test"] }
